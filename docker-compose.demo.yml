version: '3.8'

# Demo compose — LOCAL/PORTFOLIO DEMONSTRATION ONLY
# Never use in production. Demo mode is enabled, provider is fake.
# No real payment processing occurs.

services:
  postgres:
    image: postgres:15-alpine
    container_name: payflow_demo_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: payflow_demo
    ports:
      - "5433:5432"
    volumes:
      - postgres_demo_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: payflow_demo_redis
    ports:
      - "6380:6379"
    volumes:
      - redis_demo_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: payflow_demo_backend
    ports:
      - "8001:8000"
    volumes:
      - ./backend:/app
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/payflow_demo
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=demo-secret-key-not-for-production-use-only
      - OPENAI_API_KEY=${OPENAI_API_KEY:-test-key}
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID:-test}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN:-test}
      - TWILIO_WHATSAPP_NUMBER=${TWILIO_WHATSAPP_NUMBER:-whatsapp:+1555}
      - PAYFLOW_PAYMENT_PROVIDER=fake
      - ENVIRONMENT=development
      - ENABLE_DEMO_MODE=true
      - DEMO_USER_EMAIL=demo@payflow.ai
      - DEMO_USER_PASSWORD=PayFlowDemo123
      - ENABLE_CHARGE_REMINDER_WORKER=false
      - FRONTEND_URL=http://localhost:3001
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: sh -c "alembic upgrade head && python scripts/seed_demo_data.py && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  frontend:
    build: ./frontend
    container_name: payflow_demo_frontend
    ports:
      - "3001:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8001
      - NEXT_PUBLIC_ENABLE_DEMO_MODE=true
      - NEXT_PUBLIC_DEMO_EMAIL=demo@payflow.ai
    depends_on:
      - backend
    command: npm run dev

  worker:
    build: ./backend
    container_name: payflow_demo_worker
    volumes:
      - ./backend:/app
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/payflow_demo
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=demo-secret-key-not-for-production-use-only
      - PAYFLOW_PAYMENT_PROVIDER=fake
      - ENVIRONMENT=development
      - ENABLE_DEMO_MODE=true
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: python worker.py

volumes:
  postgres_demo_data:
  redis_demo_data:
