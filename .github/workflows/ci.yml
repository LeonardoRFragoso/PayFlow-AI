name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run alembic heads check
        run: alembic heads
        env:
          DATABASE_URL: "sqlite+aiosqlite:///:memory:"
          SECRET_KEY: "ci-secret-key-for-tests-only"
          OPENAI_API_KEY: "test-key"
          TWILIO_ACCOUNT_SID: "test"
          TWILIO_AUTH_TOKEN: "test"
          TWILIO_WHATSAPP_NUMBER: "whatsapp:+1555"
          PAYFLOW_PAYMENT_PROVIDER: "fake"
          ENVIRONMENT: "development"

      - name: Run tests
        run: python -m pytest -v tests
        env:
          DATABASE_URL: "sqlite+aiosqlite:///:memory:"
          SECRET_KEY: "ci-secret-key-for-tests-only"
          OPENAI_API_KEY: "test-key"
          TWILIO_ACCOUNT_SID: "test"
          TWILIO_AUTH_TOKEN: "test"
          TWILIO_WHATSAPP_NUMBER: "whatsapp:+1555"
          PAYFLOW_PAYMENT_PROVIDER: "fake"
          ENVIRONMENT: "development"

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  docker-compose-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate docker-compose.yml
        run: docker-compose config -q

      - name: Validate docker-compose.demo.yml
        run: docker-compose -f docker-compose.demo.yml config -q

  e2e-tests:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build frontend
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: "http://localhost:8000"
          NEXT_PUBLIC_ENABLE_DEMO_MODE: "true"

      - name: Run E2E tests
        run: npx playwright test
        env:
          NEXT_PUBLIC_API_URL: "http://localhost:8000"
          NEXT_PUBLIC_ENABLE_DEMO_MODE: "true"
          E2E_BASE_URL: "http://localhost:3000"
