version: '3.8'

services:
  backend:
    build: ./backend
    container_name: financial_assistant_backend_prod
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    env_file:
      - .env
    environment:
      - ENVIRONMENT=production
    depends_on:
      - redis
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4
    restart: unless-stopped

  worker:
    build: ./backend
    container_name: financial_assistant_worker_prod
    volumes:
      - ./backend:/app
    env_file:
      - .env
    environment:
      - ENVIRONMENT=production
    depends_on:
      - redis
    command: python worker.py
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: financial_assistant_redis_prod
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped

  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile.prod
    container_name: financial_assistant_frontend_prod
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  redis_data:
